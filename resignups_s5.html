  <script>
    // Google Sheet Setup
    let sheetID = "1Uf9rBnJ1zhPtU3EoVm2bar0-St0Vxon29Gouw2REq-U";
    let spreadsheetName = "resignups";

    let dataRange1 = "C1:D12";
    let dataRange2 = "G1:H16";
    let dataRange3 = "K1:L46";
    let dataRange4 = "O1:P46";
    let dataRange5 = "S1:T46";

    let URL1 =
      "https://docs.google.com/spreadsheets/d/" +
      sheetID +
      "/gviz/tq?sheet=" +
      spreadsheetName +
      "&range=" +
      dataRange1;
    let URL2 =
      "https://docs.google.com/spreadsheets/d/" +
      sheetID +
      "/gviz/tq?sheet=" +
      spreadsheetName +
      "&range=" +
      dataRange2;
    let URL3 =
      "https://docs.google.com/spreadsheets/d/" +
      sheetID +
      "/gviz/tq?sheet=" +
      spreadsheetName +
      "&range=" +
      dataRange3;
    let URL4 =
      "https://docs.google.com/spreadsheets/d/" +
      sheetID +
      "/gviz/tq?sheet=" +
      spreadsheetName +
      "&range=" +
      dataRange4;

    let URL5 =
      "https://docs.google.com/spreadsheets/d/" +
      sheetID +
      "/gviz/tq?sheet=" +
      spreadsheetName +
      "&range=" +
      dataRange5;

    // Daten abrufen
    function fetchAndRenderData(URL) {
      fetch(URL)
        .then((res) => res.text())
        .then((rep) => {
          let jsonData = JSON.parse(rep.substr(47).slice(0, -2));
          renderLeagueTable(jsonData, URL);
        })
        .catch((error) => {
          console.error("Fehler beim Abrufen der Daten: ", error);
        });
    }

    // Standard-Renderfunktion für einspaltige Tabellen
    function renderHalf(rows, selector) {
      let tableBody = document.querySelector(selector);
      tableBody.innerHTML = "";

      rows.forEach((row) => {
        let player = row.c[0]?.v || "Unbekannt";
        let status = row.c[1]?.v || "0";

        let newRow = document.createElement("tr");
        newRow.innerHTML = `<td>${player}</td>`;
        if (status == "1") newRow.style.backgroundColor = "#75A960";

        tableBody.appendChild(newRow);
      });
    }

    // Neue Renderfunktion für zweispaltige Tabellen
    function renderSplit(firstHalf, secondHalf, selector) {
      let tableBody = document.querySelector(selector);
      tableBody.innerHTML = "";

      let maxRows = Math.max(firstHalf.length, secondHalf.length);

      for (let i = 0; i < maxRows; i++) {
        let row = document.createElement("tr");

        // linke Spalte
        if (i < firstHalf.length) {
          let player = firstHalf[i].c[0]?.v || "Unbekannt";
          let status = firstHalf[i].c[1]?.v || "0";
          let td = document.createElement("td");
          td.textContent = player;
          if (status == "1") td.style.backgroundColor = "#75A960";
          row.appendChild(td);
        } else {
          row.appendChild(document.createElement("td"));
        }

        // rechte Spalte
        if (i < secondHalf.length) {
          let player = secondHalf[i].c[0]?.v || "Unbekannt";
          let status = secondHalf[i].c[1]?.v || "0";
          let td = document.createElement("td");
          td.textContent = player;
          if (status == "1") td.style.backgroundColor = "#75A960";
          row.appendChild(td);
        } else {
          row.appendChild(document.createElement("td"));
        }

        tableBody.appendChild(row);
      }
    }

    // Tabellen rendern
    function renderLeagueTable(jsonData, URL) {
      let rows = jsonData.table.rows;

      if (URL == URL1) {
        renderHalf(rows, "#liga1 tbody");
      } else if (URL == URL2) {
        renderHalf(rows, "#liga2 tbody");
      } else if (URL == URL3) {
        let halfway = Math.ceil(rows.length / 2);
        renderSplit(
          rows.slice(0, halfway),
          rows.slice(halfway),
          "#liga3 tbody",
        );
      } else if (URL == URL4) {
        let halfway = Math.ceil(rows.length / 2);
        renderSplit(
          rows.slice(0, halfway),
          rows.slice(halfway),
          "#liga4 tbody",
        );
      } else if (URL == URL5) {
        let halfway = Math.ceil(rows.length / 2);
        renderSplit(
          rows.slice(0, halfway),
          rows.slice(halfway),
          "#liga5 tbody",
        );
      }
    }

    // Lade alle Daten beim Seitenstart
    document.addEventListener("DOMContentLoaded", function () {
      fetchAndRenderData(URL1);
      fetchAndRenderData(URL2);
      fetchAndRenderData(URL3);
      fetchAndRenderData(URL4);
      fetchAndRenderData(URL5);
    });
  </script>
